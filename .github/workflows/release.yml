name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          path: fortee-talk-vote-support

      - name: Get version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r .version fortee-talk-vote-support/manifest.json)
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git -C fortee-talk-vote-support ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create zip
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          zip -r fortee-talk-vote-support.zip fortee-talk-vote-support/ \
            -x "fortee-talk-vote-support/sample.html" \
            -x "fortee-talk-vote-support/.github/*" \
            -x "fortee-talk-vote-support/.gitignore" \
            -x "fortee-talk-vote-support/.git/*"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: fortee-talk-vote-support.zip
